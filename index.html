<script>
// ========== FLEET REGISTRY ==========
const FLEET = {
  "7858":"3ฒร 7858","7852":"3ฒร 7852","7862":"3ฒร 7862","7845":"3ฒร 7845",
  "3986":"3ฒศ 3986","4531":"3ฒล 4531","4532":"3ฒล 4532","4534":"3ฒล 4534",
  "7865":"3ฒร 7865","650":"3ฒบ 650","9917":"3ฒบ 9917","4081":"4ฒข 4081",
  "4083":"4ฒข 4083","4080":"4ฒข 4080","6851":"4ฒง 6851","6861":"4ฒง 6861",
  "6862":"4ฒง 6862","651":"3ฒบ 651","3850":"4ฒฌ 3850","4120":"2ฒบ 4120",
  "4533":"3ฒล 4533","4668":"2ฒผ 4668","5593":"4ฒจ 5593","6277":"3ฒส 6277",
  "6926":"4ฒง 6926","7380":"3ฒผ 7380","7847":"3ฒร 7847","7851":"3ฒร 7851",
  "7855":"3ฒร 7855","7924":"2ฒต 7924","9913":"3ฒบ 9913","1606":"2ฒม 1606",
  "7274":"บท 7274","709":"3ฒน 709","711":"3ฒน 711","1570":"3กณ 1570",
  "2120":"3ฒน 2120","3288":"3ฒธ 3288","4423":"ฆผ 4423","4535":"3ฒล 4535",
  "4609":"9กว 4609","4625":"3ฒท 4625","5606":"3ฒญ 5606","5801":"กฉ 5801",
  "6177":"3ฒช 6177","6381":"3ฒพ 6381","6625":"กฉ 6625","6876":"3ฒท 6876",
  "7496":"บท 7496","8708":"6กฮ 8708","2ขศ1207":"2ขศ 1207","2ขฮ1337":"2ขฮ 1337",
  "3ขพ1325":"3ขพ 1325","4กฐ1988":"4กฐ 1988","8กฆ1337":"8กฆ 1337",
  "FORKLIFT":"โฟล์คลิฟท์","SERCOOLER":"เซอร์คูลเลอร์"
};

// บัตร PTT VIP ใช้ร่วมกัน 2 คันนี้ — ระบุคันจากการเทียบเลขไมล์บนบิลกับรูปหน้าปัด
const VIP_CARS = ['2ฒม 1606', 'บท 7274'];

const BATCH_SIZE = 15;
const MAX_IMG_SIZE = 1280;
const QUALITY = 0.85;

// ---------- helpers ----------
function digitsOnly(v) { return String(v == null ? '' : v).replace(/[^0-9]/g, ''); }
function toMile(v) { return parseInt(digitsOnly(v), 10) || 0; }

// matchFleet: exact match ก่อน แล้ว longer-key-first includes (กัน 651 โดนจับเป็น 650)
function matchFleet(raw) {
  if (!raw) return raw;
  const clean = String(raw).replace(/\s/g,'').toUpperCase();
  for (const [key, val] of Object.entries(FLEET)) {
    if (clean === key.replace(/\s/g,'').toUpperCase()) return val;
  }
  const sorted = Object.entries(FLEET).sort((a,b) => b[0].length - a[0].length);
  for (const [key, val] of sorted) {
    if (clean.includes(key.replace(/\s/g,'').toUpperCase())) return val;
  }
  return raw;
}

// แปลงวันที่ พ.ศ. → ค.ศ. และจัดรูปแบบ dd/mm/yy
function normalizeDate(s) {
  if (!s) return '';
  const m = String(s).trim().match(/(\d{1,2})\s*[\/\-.]\s*(\d{1,2})\s*[\/\-.]\s*(\d{2,4})/);
  if (!m) return String(s).trim();
  let yy = parseInt(m[3], 10);
  if (yy > 2400) yy -= 543;              // พ.ศ.เต็ม 2569 → 2026
  if (yy >= 100) yy = yy % 100;          // 2026 → 26
  if (yy >= 43 && yy <= 99) yy -= 43;    // พ.ศ.ย่อ 69 → 26
  return String(m[1]).padStart(2,'0') + '/' + String(m[2]).padStart(2,'0') + '/' + String(yy).padStart(2,'0');
}

// ทำความสะอาด + ตรวจความถูกต้องของ 1 รายการที่ AI ส่งมา
function normalizeEntry(raw) {
  const e = { ...raw };
  e.note = e.note || '';
  e.pump = e.pump || '';
  e.date = normalizeDate(e.date);
  e.total = parseFloat(String(e.total == null ? '' : e.total).replace(/[^0-9.]/g, '')) || 0;
  e.mile_after = digitsOnly(e.mile_after);
  e.flagged = !!e.flagged;

  // บัตร VIP ที่ AI ระบุคันไม่ได้ → ติดธงแดงให้เลือกเอง (เช็คก่อน matchFleet
  // เพราะข้อความ "VIP (1606/7274)" มีเลข 1606 อยู่ จะโดน match ผิด)
  const rawCar = String(raw.car == null ? '' : raw.car);
  if (/VIP/i.test(rawCar)) {
    e.car = 'VIP — ' + VIP_CARS.join(' หรือ ');
    e.flagged = true;
    e.note = [e.note, 'บัตร VIP ระบุรถอัตโนมัติไม่ได้ โปรดเลือกคันแล้วคีย์เอง'].filter(Boolean).join(' | ');
  } else {
    e.car = matchFleet(rawCar);
  }

  // invoice: ตัวเลขล้วน 17-20 หลัก ขึ้นต้นด้วย 1 เท่านั้น — ถ้าไม่ผ่านให้ว่างไว้ + เตือน
  const inv = digitsOnly(e.invoice);
  if (inv && (inv.length < 17 || inv.length > 20 || inv[0] !== '1')) {
    e.invoice = '';
    e.note = [e.note, 'อ่าน invoice ได้ไม่ครบ (' + inv + ') โปรดคีย์จากบิล'].filter(Boolean).join(' | ');
  } else {
    e.invoice = inv;
  }
  e.coupon = digitsOnly(e.coupon);

  // บังคับความสอดคล้อง: KJ OIL ไม่มี invoice, PTT ไม่มีคูปอง
  if (e.pump.includes('KJ')) { e.invoice = ''; }
  if (e.pump.includes('PTT')) { e.coupon = ''; }

  if (e.no_fill_marked) { e.filled = false; }
  return e;
}

// รวมผลข้ามรายการ/ข้าม batch แบบ "เติมช่องว่าง" ไม่ใช่เขียนทับทั้งก้อน
function mergeParsed(existing, newItems) {
  const result = [...existing];
  for (const raw of newItems) {
    const item = normalizeEntry(raw);
    const idx = result.findIndex(r => r.car === item.car);
    if (idx === -1) { result.push(item); continue; }
    const cur = result[idx];

    // มีเขียน "ไม่เติม" บนรูป → ชนะทุกอย่าง ห้ามผูกบิล
    if (cur.no_fill_marked || item.no_fill_marked) {
      result[idx] = { car: cur.car, filled: false, no_fill_marked: true,
        pump:'', date:'', invoice:'', coupon:'', total:0, mile_after:'',
        image_problem: false, flagged: false, note: 'มีเขียน "ไม่เติม" บนรูปหน้าปัด' };
      continue;
    }

    // note: ถ้าฝั่งหนึ่งเจอบิล อีกฝั่งเจอแต่หน้าปัด → ใช้ note ฝั่งที่เจอบิลเท่านั้น
    // (กัน note ค้างแบบ "ไม่มีบิลในชุดนี้" ทั้งที่อีก batch เจอบิลแล้ว)
    let note;
    if (cur.filled && !item.filled)      note = cur.note;
    else if (!cur.filled && item.filled) note = item.note;
    else note = [cur.note, item.note].filter(Boolean).filter((v,i,a)=>a.indexOf(v)===i).join(' | ');

    const mile = Math.max(toMile(cur.mile_after), toMile(item.mile_after));
    result[idx] = {
      ...cur,
      filled: cur.filled || item.filled,
      pump: cur.pump || item.pump,
      date: cur.date || item.date,
      invoice: cur.invoice || item.invoice,
      coupon: cur.coupon || item.coupon,
      total: cur.total || item.total,
      mile_after: mile ? String(mile) : '',
      image_problem: cur.image_problem || item.image_problem,
      flagged: cur.flagged || item.flagged,
      note: note
    };
  }
  return result;
}

// ตรวจคูปอง/invoice ซ้ำข้ามคัน — ถ้าซ้ำ ทำเครื่องหมายแดงให้เช็คเอง
function flagDuplicates(list) {
  const seen = {};
  for (const d of list) {
    if (!d.filled) continue;
    const keys = [];
    if (d.coupon) keys.push('คูปอง ' + d.coupon);
    if (d.invoice) keys.push('invoice ' + d.invoice);
    for (const k of keys) {
      if (seen[k] && seen[k] !== d) {
        d.flagged = true; seen[k].flagged = true;
        d.note = [d.note, '⚠️ ' + k + ' ซ้ำกับ ' + seen[k].car + ' — โปรดเช็คบิลจริง'].filter(Boolean).join(' | ');
        seen[k].note = [seen[k].note, '⚠️ ' + k + ' ซ้ำกับ ' + d.car + ' — โปรดเช็คบิลจริง'].filter(Boolean).join(' | ');
      } else {
        seen[k] = d;
      }
    }
  }
}

async function compressImage(b64, type) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > MAX_IMG_SIZE || h > MAX_IMG_SIZE) {
        if (w > h) { h = Math.round(h * MAX_IMG_SIZE / w); w = MAX_IMG_SIZE; }
        else { w = Math.round(w * MAX_IMG_SIZE / h); h = MAX_IMG_SIZE; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve({ b64: canvas.toDataURL('image/jpeg', QUALITY).split(',')[1], type: 'image/jpeg' });
    };
    img.src = 'data:' + type + ';base64,' + b64;
  });
}

let files = [], imgData = [], parsed = [];

function onDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').style.background = '#fff';
  onFiles(e.dataTransfer.files);
}

function onFiles(fl) {
  for (let f of fl) {
    if (!f.type.startsWith('image/')) continue;
    if (files.length >= 60) break;
    files.push(f);
    const reader = new FileReader();
    reader.onload = ev => {
      imgData.push({ name: f.name, b64: ev.target.result.split(',')[1], type: f.type });
      const img = document.createElement('img');
      img.src = ev.target.result;
      img.className = 'thumb';
      document.getElementById('preview-row').appendChild(img);
    };
    reader.readAsDataURL(f);
  }
  document.getElementById('cnt-img').textContent = files.length;
  document.getElementById('btn-row').style.display = 'flex';
}

// ========== PROMPT ==========
const PROMPT = (fleetList) => `คุณคือระบบบัญชีน้ำมันรถบริษัท Meiwa อ่านรูปทุกรูปในชุดนี้แล้วสรุปเป็น JSON array

ทะเบียนรถที่รู้จัก (เลขย่อ → ทะเบียนเต็ม):
${fleetList}

===== กฎเหล็กข้อ 1: บิลคือแหล่งข้อมูลเดียวของรายการเติม =====
- รายการ filled:true ทุกรายการต้องมาจากบิล/ใบเสร็จเท่านั้น
- รถเจ้าของบิล = ทะเบียนที่เขียน/พิมพ์ "บนบิลใบนั้น" เท่านั้น ห้ามเดาจากรูปหน้าปัดที่อยู่ติดกันในชุดรูป
- ตัวเลขเขียนมือบนบิลอาจอ่านยาก ให้เทียบกับรายการทะเบียนด้านบนแล้วเลือกตัวที่ใกล้เคียงที่สุด
- เลขคูปอง 1 เลข เป็นของรถได้ 1 คันเท่านั้น ห้ามให้รถ 2 คันมีคูปองเลขเดียวกันเด็ดขาด
- ใบเสร็จที่พิมพ์ซ้ำ (เลข NO: เดียวกัน หรือเลขใบกำกับเดียวกัน) = ธุรกรรมเดียว นับครั้งเดียว

===== กฎเหล็กข้อ 2: แยกประเภทเอกสารให้ถูก =====
[A] บิลเขียว KJ OIL — กระดาษสีเขียว หัวบิล "บิลเงินเชื่อ บริษัท เค เจ ออยล์ จำกัด"
  - coupon = เลขพิมพ์มุมบนขวา หลังคำว่า "เลขที่" (เช่น 45635) อ่านให้ครบทุกหลัก
  - car = ช่อง "ทะเบียนรถ" (เขียนมือ), date = ช่อง "วันที่", total = ช่อง "รวมยอด"
[B] ใบเสร็จขาวของ KJ OIL/บางจาก — มีคำว่า "บจก.เค เจ ออยล์" หรือ www.bangchakmarketplace.com หรือบรรทัด "NO: xxxxxx"
  - เป็นธุรกรรม KJ OIL (ใบประกอบของบิลเขียว) ไม่ใช่ PTT เด็ดขาด ห้ามใส่ invoice ให้
  - ทะเบียนเขียนมือบนหัวใบใช้จับคู่รถได้
[C] ใบเสร็จ PTT — มีโลโก้ pttstation / "SALE PTT Fleet" / มีบรรทัด TID: TRACE: APPR:
  - invoice = เลขท้ายบิลหลังคำว่า "เลขที่" ยาว 17-20 หลัก ขึ้นต้นด้วย 1 (เช่น 126754125603090175)
  - คัดลอก invoice ทีละหลักจนครบทุกตัว ห้ามตัดหลักท้าย ห้ามเว้นวรรค ห้ามแต่งเลขเอง
  - car = บรรทัด "ทะเบียนรถ" บนสลิป, mile_after = "เลขระยะทาง(KM)", total = TOTAL
- ห้ามสร้าง invoice ให้รถที่ไม่มีใบเสร็จ PTT ของตัวเองเด็ดขาด

===== กฎเหล็กข้อ 3: รูปหน้าปัดไมล์ =====
- รูปหน้าปัด (มีป้ายทะเบียนแปะ) ใช้บอกเลขไมล์ ODO ของรถคันนั้นเท่านั้น ห้ามสร้างรายการเติมจากรูปหน้าปัด
- ถ้ามีเขียนคำว่า "ไม่เติม" บนรูป → no_fill_marked:true, filled:false ห้ามผูกบิลใดๆ กับคันนี้เด็ดขาด
- หน้าปัด 2 รูปของคันเดียว: เลขมากกว่า = หลังเติม ใช้เป็น mile_after (เฉพาะรถที่มีบิล PTT)
- รถที่มีแต่รูปหน้าปัดและไม่มีบิลในชุดนี้ → filled:false, note:"" (ชุดรูปอาจถูกแบ่งส่ง ระบบจะรวมผลให้เอง ไม่ต้องเขียนหมายเหตุ)

===== กฎเหล็กข้อ 4: ข้อมูลที่มองไม่เห็น = ไม่มี ห้ามยืม ห้ามเดา =====
- ถ้าส่วนใดของบิลถูกนิ้วบัง / ถ่ายไม่ติด / ขาดหาย / เบลอ → ให้ field นั้นเป็น "" เท่านั้น
- ห้ามหยิบเลขจากบิลใบอื่นในชุดมาใส่แทนเด็ดขาด ต่อให้รูปแบบเลขดูคล้ายกัน
- ตัวอย่างที่ห้ามทำ: บิลของ 3ฒล 4531 มองไม่เห็นเลขที่ท้ายบิล แล้วไปคัดเลขที่จากบิลของ 4ฒข 4081 มาใส่ให้ 4531 — ผิดร้ายแรง ที่ถูกคือ invoice:"" และ note:"invoice ถูกบัง/อ่านไม่ได้"
- บิลที่อ่านข้อมูลหลักได้ครบ (ทะเบียน + ยอดเงิน + วันที่) แต่ invoice หรือคูปองอ่านไม่ได้ → ยังเป็น filled:true ปกติ ห้ามใส่ image_problem แค่เว้น field นั้นว่างแล้วบอกใน note
- image_problem:true ใช้เฉพาะกรณีอ่านข้อมูลหลักไม่ได้เลย (ไม่รู้ว่าทะเบียนอะไร หรือไม่รู้ยอดเงิน)

===== บัตร PTT VIP =====
- ใบเสร็จ PTT บางใบพิมพ์ทะเบียนรถว่า "VIP" — บัตรนี้ใช้ร่วมกัน 2 คัน: 2ฒม 1606 และ บท 7274
- วิธีระบุคัน: เทียบ "เลขระยะทาง(KM)" บนบิล กับเลข ODO บนรูปหน้าปัดในชุด คันที่เลขใกล้เคียงกัน (ต่างกันไม่เกินหลักสิบกิโลเมตร) คือเจ้าของบิล แล้วใช้ทะเบียนจากป้ายบนหน้าปัดคันนั้น พร้อม note:"บิล VIP ระบุจากเลขไมล์"
- ถ้าไม่มีรูปหน้าปัดให้เทียบ หรือเลขไม่ใกล้เคียงสักคัน → car:"VIP" (ระบบจะให้ผู้ใช้เลือกเอง)

===== วันที่ =====
- แปลงปี พ.ศ. เป็น ค.ศ. เสมอ: 2569→26, 69→26 ตอบรูปแบบ dd/mm/yy เช่น 09/03/26

ตอบเป็น JSON array เท่านั้น ห้ามพิมพ์อะไรก่อนหรือหลัง ห้ามใช้ markdown เริ่มด้วย [ จบด้วย ] เท่านั้น:
[{
  "car": "ทะเบียนเต็ม",
  "filled": true,
  "no_fill_marked": false,
  "pump": "PTT" หรือ "KJ OIL",
  "date": "09/03/26",
  "invoice": "เฉพาะ PTT: เลข 17-20 หลักขึ้นต้นด้วย 1 ครบทุกหลัก หรือ \"\" ถ้าอ่านไม่ได้",
  "coupon": "เฉพาะ KJ OIL: เลขที่บนบิลเขียว หรือ \"\" ถ้าอ่านไม่ได้",
  "total": 400,
  "mile_after": "เฉพาะ PTT",
  "image_problem": false,
  "note": ""
}]`;

async function callAPI(images) {
  const fleetList = Object.entries(FLEET).map(([k,v]) => k+' → '+v).join('\n');
  const content = [];
  for (let img of images) {
    const comp = await compressImage(img.b64, img.type);
    content.push({ type: 'image', source: { type: 'base64', media_type: comp.type, data: comp.b64 } });
  }
  content.push({ type: 'text', text: PROMPT(fleetList) });

  const res = await fetch('/api/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 4096,
      messages: [{ role: 'user', content }]
    })
  });
  const data = await res.json();
  if (!res.ok) throw new Error('Server error ' + res.status + ': ' + (data.error || JSON.stringify(data)));
  if (!data.content) throw new Error('Response ผิดรูปแบบ: ' + JSON.stringify(data).substring(0,200));

  const txt = data.content.map(i => i.text||'').join('').trim();
  const start = txt.indexOf('[');
  const end   = txt.lastIndexOf(']');
  if (start === -1 || end === -1) throw new Error('AI ตอบผิดรูปแบบ: ' + txt.substring(0,150));
  return JSON.parse(txt.substring(start, end+1));
}

async function analyze() {
  if (!imgData.length) return;
  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('results').innerHTML = '';
  document.getElementById('export-row').style.display = 'none';
  parsed = [];

  const batches = [];
  for (let i = 0; i < imgData.length; i += BATCH_SIZE) batches.push(imgData.slice(i, i+BATCH_SIZE));

  try {
    for (let i = 0; i < batches.length; i++) {
      document.getElementById('progress-fill').style.width = Math.round((i/batches.length)*100)+'%';
      document.getElementById('loading-text').textContent =
        `กำลังประมวลผล batch ${i+1}/${batches.length} (รูปที่ ${i*BATCH_SIZE+1}–${Math.min((i+1)*BATCH_SIZE,imgData.length)})...`;
      parsed = mergeParsed(parsed, await callAPI(batches[i]));
    }
    document.getElementById('progress-fill').style.width = '100%';
    flagDuplicates(parsed);
    renderResults(parsed);
  } catch(e) {
    document.getElementById('results').innerHTML = '<div class="error">เกิดข้อผิดพลาด: '+e.message+'</div>';
  }
  document.getElementById('loading').style.display = 'none';
  btn.disabled = false;
}

// สร้างตารางช่องข้อมูลของการ์ด (ใช้ทั้งการ์ดปกติและการ์ดรูปไม่ชัด)
function fieldsHtml(d) {
  const pump  = d.pump||'';
  const isPTT = pump.includes('PTT');
  const isKJ  = pump.includes('KJ');
  const couponVal  = d.coupon  || '⚠️ ไม่พบ — คีย์เอง';
  const invoiceVal = d.invoice || '⚠️ ไม่พบ — คีย์เอง';
  const couponStyle  = !d.coupon  ? 'color:#dc2626;font-weight:600' : '';
  const invoiceStyle = !d.invoice ? 'color:#dc2626;font-weight:600' : '';
  return `<div class="fields">
    <div class="field"><div class="field-label">วันที่</div><div class="field-val">${d.date||'-'}</div></div>
    ${isPTT ? `
    <div class="field"><div class="field-label">Invoice</div><div class="field-val" style="font-size:10px;${invoiceStyle}">${invoiceVal}</div></div>
    <div class="field"><div class="field-label">ไมล์หลังเติม</div><div class="field-val">${d.mile_after||'-'}</div></div>` : ''}
    ${isKJ ? `
    <div class="field"><div class="field-label">เลขที่คูปอง</div><div class="field-val" style="${couponStyle}">${couponVal}</div></div>` : ''}
  </div>`;
}

function renderResults(data) {
  const filled = data.filter(d => d.filled && !d.image_problem);
  const nofill = data.filter(d => !d.filled);
  const warn   = data.filter(d => d.image_problem);

  const total = filled.reduce((s,d) => s+(d.total||0), 0);
  document.getElementById('cnt-fill').textContent  = filled.length;
  document.getElementById('cnt-no').textContent    = nofill.length;
  document.getElementById('cnt-total').textContent = '฿'+total.toLocaleString();

  let html = '';

  if (warn.length) {
    html += '<div class="section-label">⚠️ รูปมีปัญหา — กรุณาคีย์เอง</div>';
    for (let d of warn) {
      html += `<div class="card-warn">
        <div class="card-header">
          <span class="car-name">${d.car||'-'}</span>
          <span class="tag tag-warn">⚠️ รูปไม่ชัด</span>
          ${d.total ? `<span class="amount">฿${d.total.toLocaleString()}</span>` : ''}
        </div>
        ${d.pump ? fieldsHtml(d) : ''}
        <div class="warn-note">${d.note||'กรุณาตรวจสอบและคีย์ข้อมูลเอง'}</div>
      </div>`;
    }
  }

  if (filled.length) {
    html += '<div class="section-label">รายการเติมน้ำมัน</div>';
    for (let d of filled) {
      const pump  = d.pump||'';
      const isPTT = pump.includes('PTT');
      const tagCls = isPTT ? 'tag-ptt' : 'tag-kj';
      html += `<div class="card${d.flagged ? ' card-alert' : ''}">
        <div class="card-header">
          <span class="car-name">${d.car||'-'}</span>
          <span class="tag ${tagCls}">${pump}</span>
          <span class="amount">฿${(d.total||0).toLocaleString()}</span>
        </div>
        ${fieldsHtml(d)}
        ${d.note ? `<div class="${d.flagged ? 'note-alert' : 'note'}">${d.note}</div>` : ''}
      </div>`;
    }
  }

  if (nofill.length) {
    html += `<div class="section-label">ไม่เติมน้ำมัน</div>
    <div class="no-fill-box">
      <div style="font-size:13px;color:#888;">รถที่ไม่เติมวันนี้ (${nofill.length} คัน)</div>
      <div class="no-fill-grid">`;
    for (let d of nofill) html += `<div class="no-fill-tag">🚗 ${d.car||'-'}${d.no_fill_marked ? ' ✍️' : ''}</div>`;
    html += '</div></div>';
  }

  document.getElementById('results').innerHTML = html;
  if (filled.length) document.getElementById('export-row').style.display = 'flex';
}

function exportCSV(type) {
  const filled = parsed.filter(d => d.filled && !d.image_problem);
  let rows, header;
  if (type === 'ptt') {
    const list = filled.filter(d => (d.pump||'').includes('PTT'));
    header = 'DATE,INVOICE NO.,CAR,TOTAL,MILE';
    // invoice ห่อเป็น ="..." กัน Excel แปลงเลข 18 หลักเป็น 1.26E+17
    rows = list.map(d => `${d.date||''},${d.invoice ? '="'+d.invoice+'"' : ''},${d.car||''},${d.total||''},${d.mile_after||''}`);
  } else {
    const list = filled.filter(d => (d.pump||'').includes('KJ'));
    header = 'DATE,COUPON,CAR,TOTAL';
    rows = list.map(d => `${d.date||''},${d.coupon||''},${d.car||''},${d.total||''}`);
  }
  const blob = new Blob(['\uFEFF'+[header,...rows].join('\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = type === 'ptt' ? 'fuel_ptt.csv' : 'fuel_kj.csv';
  a.click();
}

function resetAll() {
  files=[]; imgData=[]; parsed=[];
  document.getElementById('preview-row').innerHTML='';
  document.getElementById('results').innerHTML='';
  document.getElementById('cnt-img').textContent='0';
  document.getElementById('cnt-fill').textContent='0';
  document.getElementById('cnt-no').textContent='0';
  document.getElementById('cnt-total').textContent='฿0';
  document.getElementById('btn-row').style.display='none';
  document.getElementById('export-row').style.display='none';
  document.getElementById('loading').style.display='none';
  document.getElementById('progress-fill').style.width='0%';
}
