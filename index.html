<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เติมน้ำมัน Meiwa</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
.container { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem; }
h1 { font-size: 18px; font-weight: 600; margin-bottom: 1.5rem; }
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.5rem; }
.stat { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 10px; padding: 12px; text-align: center; }
.stat-label { font-size: 11px; color: #888; margin-bottom: 4px; }
.stat-val { font-size: 20px; font-weight: 600; }
.upload-zone { border: 1.5px dashed #ccc; border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; background: #fff; transition: background 0.15s; margin-bottom: 1rem; }
.upload-zone:hover { background: #f9f9f9; }
.upload-icon { font-size: 32px; margin-bottom: 8px; }
.upload-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
.upload-sub { font-size: 13px; color: #888; }
.preview-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }
.thumb { width: 72px; height: 72px; object-fit: cover; border-radius: 8px; border: 0.5px solid #e0e0e0; }
.btn-row { display: none; gap: 8px; margin-bottom: 1rem; }
.btn { padding: 10px 20px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; font-size: 14px; cursor: pointer; font-weight: 500; }
.btn:hover { background: #f5f5f5; }
.btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; flex: 1; }
.btn-primary:hover { background: #333; }
.btn-primary:disabled { background: #999; border-color: #999; cursor: not-allowed; }
.loading { display: none; text-align: center; padding: 2rem; color: #888; font-size: 14px; }
.spinner { width: 24px; height: 24px; border: 2px solid #e0e0e0; border-top-color: #1a1a1a; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.progress-bar { width: 100%; background: #e0e0e0; border-radius: 8px; height: 6px; margin-top: 8px; }
.progress-fill { height: 6px; background: #1a1a1a; border-radius: 8px; transition: width 0.3s; }
.section-label { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin: 1.5rem 0 8px; }
.card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 1rem; margin-bottom: 8px; }
.card-alert { border: 1.5px solid #dc2626; background: #fff5f5; }
.card-warn { background: #fffbeb; border: 1.5px solid #f59e0b; border-radius: 12px; padding: 1rem; margin-bottom: 8px; }
.card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.car-name { font-size: 16px; font-weight: 600; }
.tag { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500; }
.tag-ptt { background: #e8f0fe; color: #1a56db; }
.tag-kj { background: #fce7f3; color: #9d174d; }
.tag-warn { background: #fef3c7; color: #92400e; }
.amount { margin-left: auto; font-size: 15px; font-weight: 600; }
.fields { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 6px; }
.field { background: #f8f8f8; border-radius: 8px; padding: 6px 10px; }
.field-label { font-size: 10px; color: #888; margin-bottom: 2px; }
.field-val { font-size: 12px; font-weight: 500; word-break: break-all; }
.no-fill-box { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 1rem; margin-bottom: 8px; }
.no-fill-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.no-fill-tag { background: #f5f5f5; border-radius: 8px; padding: 6px 12px; font-size: 13px; color: #666; }
.export-row { display: none; gap: 8px; margin-top: 1rem; }
.note { font-size: 12px; color: #888; margin-top: 8px; }
.note-alert { font-size: 12px; color: #dc2626; font-weight: 600; margin-top: 8px; }
.warn-note { font-size: 12px; color: #92400e; margin-top: 8px; font-weight: 600; }
.error { color: #dc2626; font-size: 13px; padding: 1rem; background: #fef2f2; border-radius: 8px; word-break: break-all; }
.section-sub { font-size: 12px; color: #b45309; margin: -4px 0 8px; }
@media (max-width: 400px) {
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .stat-val { font-size: 18px; }
}
</style>
</head>
<body>
<div class="container">
  <h1>⛽ ระบบบันทึกน้ำมัน Meiwa</h1>

  <div class="stat-grid">
    <div class="stat"><div class="stat-label">รูปที่อัปโหลด</div><div class="stat-val" id="cnt-img">0</div></div>
    <div class="stat"><div class="stat-label">รายการเติม</div><div class="stat-val" id="cnt-fill">0</div></div>
    <div class="stat"><div class="stat-label">ไม่เติม</div><div class="stat-val" id="cnt-no">0</div></div>
    <div class="stat"><div class="stat-label">ยอดรวม</div><div class="stat-val" id="cnt-total">฿0</div></div>
  </div>

  <div class="upload-zone" id="drop-zone"
    onclick="document.getElementById('file-in').click()"
    ondragover="event.preventDefault();this.style.background='#f0f0f0'"
    ondragleave="this.style.background='#fff'"
    ondrop="onDrop(event)">
    <div class="upload-icon">📷</div>
    <div class="upload-title">อัปโหลดรูปทั้งหมดได้เลย</div>
    <div class="upload-sub">รูปบิล + รูปหน้าปัดไมล์ ทุกคัน ไม่ต้องแยก (รองรับสูงสุด 60 รูป)</div>
  </div>
  <input type="file" id="file-in" accept="image/*" multiple style="display:none" onchange="onFiles(this.files)">

  <div class="preview-row" id="preview-row"></div>

  <div class="btn-row" id="btn-row">
    <button class="btn btn-primary" id="analyze-btn" onclick="analyze()">🤖 วิเคราะห์ด้วย AI</button>
    <button class="btn" onclick="resetAll()">ล้าง</button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div id="loading-text">กำลังประมวลผล...</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div id="results"></div>

  <div class="export-row" id="export-row">
    <button class="btn" style="flex:1" onclick="exportCSV('ptt')">⬇️ Export PTT (.csv)</button>
    <button class="btn" style="flex:1" onclick="exportCSV('kj')">⬇️ Export KJ OIL (.csv)</button>
  </div>
</div>

<script>
/* =====================================================================
   v6 — เวอร์ชันสุดท้าย
   หลักการ: "AI อ่านทีละรูป / โค้ดตัดสินใจทั้งหมด"

   1) ส่งรูปทีละ 1 รูปต่อ 1 คำขอ + temperature 0
      → ข้อมูลข้ามคันปนกันไม่ได้ และรันซ้ำชุดเดิมได้ผลเดิม
   2) AI เป็นแค่เครื่องคัดลอก (transcriber) ห้ามจับคู่ ห้ามเดา
      ใบขาว KJ: AI คัดลอก "ลายมือทั้งหมด" มาดิบ ๆ ใส่ช่อง hand
      แล้ว JS ค่อยหาว่าเลขไหนคือทะเบียน (เทียบกับทะเบียนรถบริษัทเท่านั้น)
      → เลขไมล์อย่าง 1879 จะไม่กลายเป็นทะเบียนรถอีก
   3) กฎตายตัวใน JS:
      - หน้าปัดเขียน "ไม่เติม" = ไม่เติมเสมอ ห้ามมีบิลไปเกาะ
        ถ้ามีบิลที่ทะเบียนชนกับคันไม่เติม → แยกไปหมวด "ต้องตรวจสอบ"
        (ไม่รวมในยอดรวมและ CSV จนกว่าคนจะเช็คเอง)
      - มีแต่ใบขาว ไม่มีบิลเขียว = KJ OIL แน่นอน
        แสดงแค่ วันที่ / ทะเบียน / ยอด + "บิลไม่ครบ กรุณาตรวจสอบ"
      - บิลเขียว+ใบขาว จับคู่กันด้วย "อยู่ในรูปเดียวกัน" ก่อน แล้วค่อยดูยอดเงิน
      - ทะเบียนที่อ่านได้แต่ไม่อยู่ในทะเบียนรถบริษัท → หมวด "ต้องตรวจสอบ"
   ===================================================================== */

// ========== FLEET REGISTRY ==========
const FLEET = {
  "7858":"3ฒร 7858","7852":"3ฒร 7852","7862":"3ฒร 7862","7845":"3ฒร 7845",
  "3986":"3ฒศ 3986","4531":"3ฒล 4531","4532":"3ฒล 4532","4534":"3ฒล 4534",
  "7865":"3ฒร 7865","650":"3ฒบ 650","9917":"3ฒบ 9917","4081":"4ฒข 4081",
  "4083":"4ฒข 4083","4080":"4ฒข 4080","6851":"4ฒง 6851","6861":"4ฒง 6861",
  "6862":"4ฒง 6862","651":"3ฒบ 651","3850":"4ฒฌ 3850","4120":"2ฒบ 4120",
  "4533":"3ฒล 4533","4668":"2ฒผ 4668","5593":"4ฒจ 5593","6277":"3ฒส 6277",
  "6926":"4ฒง 6926","7380":"3ฒผ 7380","7847":"3ฒร 7847","7851":"3ฒร 7851",
  "7855":"3ฒร 7855","7924":"2ฒต 7924","9913":"3ฒบ 9913","1606":"2ฒม 1606",
  "7274":"บท 7274","709":"3ฒน 709","711":"3ฒน 711","1570":"3กณ 1570",
  "2120":"3ฒน 2120","3288":"3ฒธ 3288","4423":"ฆผ 4423","4535":"3ฒล 4535",
  "4609":"9กว 4609","4625":"3ฒท 4625","5606":"3ฒญ 5606","5801":"กฉ 5801",
  "6177":"3ฒช 6177","6381":"3ฒพ 6381","6625":"กฉ 6625","6876":"3ฒท 6876",
  "7496":"บท 7496","8708":"6กฮ 8708","2ขศ1207":"2ขศ 1207","2ขฮ1337":"2ขฮ 1337",
  "3ขพ1325":"3ขพ 1325","4กฐ1988":"4กฐ 1988","8กฆ1337":"8กฆ 1337",
  "FORKLIFT":"โฟล์คลิฟท์","SERCOOLER":"เซอร์คูลเลอร์"
};
const FLEET_VALUES = new Set(Object.values(FLEET));

// บัตร PTT VIP ใช้ร่วมกัน 2 คันนี้ — JS ระบุคันโดยเทียบเลขไมล์บนบิลกับ ODO หน้าปัด
const VIP_CARS = ['2ฒม 1606', 'บท 7274'];
const VIP_KM_TOLERANCE = 50;

// invoice PTT ปกติ 18 หลัก ขึ้นต้นด้วย 1 — ถ้าวันหนึ่งเจอของจริง 17 หลัก แก้เลขนี้
const INVOICE_MIN_LEN = 18;
const INVOICE_MAX_LEN = 20;

const CONCURRENCY = 4;        // อ่านพร้อมกันกี่รูป
const MAX_IMG_SIZE = 1568;    // ใหญ่ขึ้นจาก 1280 → เลข invoice ตัวเล็กอ่านง่ายขึ้น
const QUALITY = 0.92;

// ---------- helpers ----------
function digitsOnly(v) { return String(v == null ? '' : v).replace(/[^0-9]/g, ''); }
function toMile(v) { return parseInt(digitsOnly(v), 10) || 0; }
function noteJoin() {
  return Array.from(arguments).filter(Boolean).filter((v,i,a)=>a.indexOf(v)===i).join(' | ');
}

// matchFleet: exact ก่อน แล้ว longer-key-first includes (กัน 651 โดนจับเป็น 650)
function matchFleet(raw) {
  if (!raw) return '';
  const clean = String(raw).replace(/\s/g,'').toUpperCase();
  if (!clean) return '';
  for (const [key, val] of Object.entries(FLEET)) {
    if (clean === key.replace(/\s/g,'').toUpperCase()) return val;
  }
  // includes ใช้เฉพาะข้อความสั้น ๆ ที่หน้าตาเหมือนทะเบียน (กันเลขไมล์/invoice ยาว ๆ บังเอิญมีเลขซ้อน)
  if (clean.length <= 12) {
    const sorted = Object.entries(FLEET).sort((a,b) => b[0].length - a[0].length);
    for (const [key, val] of sorted) {
      if (clean.includes(key.replace(/\s/g,'').toUpperCase())) return val;
    }
  }
  return String(raw).trim();
}

// หา "ทะเบียน" จากลายมือบนใบขาว — ยอมรับเฉพาะเลขที่อยู่ในทะเบียนรถบริษัทเท่านั้น
// ลายมืออาจมี เลขไมล์(5-6 หลัก) / จำนวนลิตร / ยอดเงิน ปนกัน → ตัดทิ้งหมด
function resolveHandReg(hand, total) {
  if (!hand) return '';
  const whole = matchFleet(hand);
  if (FLEET_VALUES.has(whole)) return whole;
  const toks = String(hand).match(/[0-9]+/g) || [];
  for (const t of toks) {
    if (t.length < 3 || t.length > 4) continue;            // ทะเบียนมี 3-4 หลัก
    if (total && Math.abs(parseFloat(t) - total) < 0.01) continue; // กันไปจับยอดเงิน
    if (FLEET[t]) return FLEET[t];
  }
  return '';
}

// ดึงเลขไมล์ (5-6 หลัก) จากลายมือ — ใช้เป็นตัวสำรองของบิล PTT
function kmFromHand(hand) {
  const toks = String(hand || '').match(/[0-9]+/g) || [];
  for (const t of toks) if (t.length >= 5 && t.length <= 6) return t;
  return '';
}

// แปลงวันที่ พ.ศ. → ค.ศ. รูปแบบ dd/mm/yy (2569→26, 69→26, 26→26)
function normalizeDate(s) {
  if (!s) return '';
  const m = String(s).trim().match(/(\d{1,2})\s*[\/\-.]\s*(\d{1,2})\s*[\/\-.]\s*(\d{2,4})/);
  if (!m) return String(s).trim();
  let yy = parseInt(m[3], 10);
  if (yy > 2400) yy -= 543;
  if (yy >= 100) yy = yy % 100;
  if (yy >= 43 && yy <= 99) yy -= 43;
  return String(m[1]).padStart(2,'0') + '/' + String(m[2]).padStart(2,'0') + '/' + String(yy).padStart(2,'0');
}

// ---------- ทำความสะอาดข้อมูลดิบจาก AI ----------
function normalizeBill(raw, imgIdx) {
  const b = {};
  const doc = String(raw.doc || '').toUpperCase();
  if (doc.includes('PTT')) b.doc = 'PTT';
  else if (doc.includes('WHITE')) b.doc = 'KJ_WHITE';
  else if (doc.includes('GREEN')) b.doc = 'KJ_GREEN';
  else b.doc = raw.coupon ? 'KJ_GREEN' : (raw.txn ? 'KJ_WHITE' : 'PTT');

  b._img = imgIdx;
  b.carRaw = String(raw.car == null ? '' : raw.car).trim();
  b.isVIP = /VIP/i.test(b.carRaw);
  b.car = (b.isVIP || !b.carRaw) ? '' : matchFleet(b.carRaw);
  b.hand = String(raw.hand || '').trim();
  b.date = normalizeDate(raw.date);
  b.total = parseFloat(String(raw.total == null ? '' : raw.total).replace(/[^0-9.]/g, '')) || 0;
  b.liters = parseFloat(String(raw.liters == null ? '' : raw.liters).replace(/[^0-9.]/g, '')) || 0;
  b.km = digitsOnly(raw.km);
  b.txn = digitsOnly(raw.txn);
  b.coupon = digitsOnly(raw.coupon);
  b.unreadable = !!raw.unreadable;
  b.flagged = false;
  b.note = String(raw.note || '');

  // invoice: ต้องครบทุกหลัก ขึ้นต้นด้วย 1 — ไม่ครบ = เว้นว่างให้คีย์เอง
  const inv = digitsOnly(raw.invoice);
  if (inv && (inv.length < INVOICE_MIN_LEN || inv.length > INVOICE_MAX_LEN || inv[0] !== '1')) {
    b.invoice = '';
    b.note = noteJoin(b.note, 'อ่าน invoice ได้ไม่ครบ (เห็น ' + inv.length + ' หลัก: ' + inv + ') โปรดคีย์จากบิลจริง');
  } else {
    b.invoice = inv;
  }
  if (b.doc !== 'PTT') b.invoice = '';
  if (b.doc !== 'KJ_GREEN') b.coupon = '';
  if (b.doc === 'PTT' && !b.km) b.km = kmFromHand(b.hand);
  return b;
}

function normalizeDash(raw) {
  return {
    car: matchFleet(raw.car),
    odo: toMile(raw.odo),
    no_fill: !!raw.no_fill
  };
}

// ---------- รวมบิลที่ถ่ายซ้ำ/พิมพ์ซ้ำ ให้เหลือใบเดียว ----------
function dedupeBills(bills) {
  const out = [];
  for (const b of bills) {
    const match = out.find(o =>
      o.doc === b.doc &&
      (o.car === b.car || !o.car || !b.car) &&
      (!o.date || !b.date || o.date === b.date) &&
      Math.abs(o.total - b.total) < 1 &&
      (!o.invoice || !b.invoice || o.invoice === b.invoice) &&
      (!o.coupon  || !b.coupon  || o.coupon  === b.coupon)  &&
      (!o.txn     || !b.txn     || o.txn     === b.txn)
    );
    if (match) {
      if (!match.car) match.car = b.car;
      if (!match.date) match.date = b.date;
      if (!match.hand) match.hand = b.hand;
      if (!match.invoice) { match.invoice = b.invoice; if (b.invoice) match.note = (match.note||'').replace(/อ่าน invoice ได้ไม่ครบ[^|]*/,'').replace(/^\s*\|\s*|\s*\|\s*$/g,''); }
      if (!match.coupon) match.coupon = b.coupon;
      if (!match.txn) match.txn = b.txn;
      if (!match.km) match.km = b.km;
      match.isVIP = match.isVIP || b.isVIP;
    } else {
      out.push({ ...b });
    }
  }
  return out;
}

// ---------- ระบุรถของบิล VIP จากเลขไมล์บนบิลเทียบกับ ODO หน้าปัด ----------
function resolveVIP(bill, dashMap) {
  const km = toMile(bill.km);
  const hits = [];
  if (km) {
    for (const c of VIP_CARS) {
      const dm = dashMap[c];
      if (dm && dm.odo && Math.abs(dm.odo - km) <= VIP_KM_TOLERANCE) hits.push(c);
    }
  }
  if (hits.length === 1) {
    bill.car = hits[0];
    bill.note = noteJoin(bill.note, 'บิล VIP — ระบุรถจากเลขไมล์ตรงกับหน้าปัด ' + hits[0]);
  } else {
    bill.car = 'VIP — ' + VIP_CARS.join(' หรือ ');
    bill.flagged = true;
    bill.note = noteJoin(bill.note, 'บิล VIP ระบุรถอัตโนมัติไม่ได้ โปรดเลือกคันแล้วแก้ใน CSV');
  }
}

// ---------- ประกอบผลลัพธ์สุดท้าย (deterministic ล้วน ไม่มี AI เกี่ยว) ----------
function assemble(rawBills, rawDash) {
  // 1) สรุปหน้าปัด: ต่อคันเก็บ ODO สูงสุด + ธง "ไม่เติม"
  const dashMap = {};
  for (const r of rawDash) {
    const d = normalizeDash(r);
    if (!d.car || !FLEET_VALUES.has(d.car)) continue;
    const cur = dashMap[d.car] || { odo: 0, no_fill: false };
    cur.odo = Math.max(cur.odo, d.odo);
    cur.no_fill = cur.no_fill || d.no_fill;
    dashMap[d.car] = cur;
  }
  const noFillSet = new Set(Object.keys(dashMap).filter(c => dashMap[c].no_fill));

  // 2) บิล: ทำความสะอาด → ระบุ VIP → รวมใบซ้ำ
  let bills = rawBills.filter(b => b);
  for (const b of bills) if (b.isVIP) resolveVIP(b, dashMap);
  bills = dedupeBills(bills);

  const greens = bills.filter(b => b.doc === 'KJ_GREEN');
  const whites = bills.filter(b => b.doc === 'KJ_WHITE');
  const ptts   = bills.filter(b => b.doc === 'PTT');

  // 3) ใบขาว: หาทะเบียนจากลายมือ (ยอมรับเฉพาะทะเบียนรถบริษัท)
  for (const w of whites) {
    if (!w.car || !FLEET_VALUES.has(w.car)) w.car = resolveHandReg(w.hand, w.total) || resolveHandReg(w.carRaw, w.total);
  }

  // 4) จับคู่บิลเขียว+ใบขาว: รอบแรก "อยู่ในรูปเดียวกัน" → รอบสอง ยอดเงินตรงกัน
  const canPair = (g, w) => !g._white && !w._used &&
    Math.abs(g.total - w.total) < 1 &&
    (!g.car || !w.car || g.car === w.car);
  const marry = (g, w) => {
    g._white = true; w._used = true;
    if (!g.car) g.car = w.car;
    if (!g.date) g.date = w.date;
    if (w.total && Math.abs(w.total - g.total) >= 0.05) {
      g.note = noteJoin(g.note, 'บิลเขียวเขียน ฿' + g.total.toLocaleString() + ' ใช้ยอดจากใบเสร็จ ฿' + w.total.toLocaleString());
    }
    if (w.total) g.total = w.total; // ยอดพิมพ์จากเครื่องเชื่อถือได้กว่าลายมือ
  };
  for (const w of whites) {
    const g = greens.find(g => g._img === w._img && canPair(g, w));
    if (g) marry(g, w);
  }
  for (const w of whites) {
    if (w._used) continue;
    const g = greens.find(g => canPair(g, w));
    if (g) marry(g, w);
  }

  const entries = [];

  // 5) บิลเขียว → รายการ KJ OIL ปกติ
  for (const g of greens) {
    entries.push({
      car: g.car || '', filled: true, pump: 'KJ OIL',
      date: g.date, coupon: g.coupon, invoice: '', total: g.total, mile_after: '',
      incomplete: false, review: false, unreadable: g.unreadable,
      flagged: g.flagged, no_fill_marked: false, note: g.note
    });
  }
  // 6) ใบขาวที่ไม่มีบิลเขียวคู่ → KJ OIL "บิลไม่ครบ" (แสดงแค่ วันที่/ทะเบียน/ยอด)
  for (const w of whites) {
    if (w._used) continue;
    entries.push({
      car: w.car || '', filled: true, pump: 'KJ OIL',
      date: w.date, coupon: '', invoice: '', total: w.total, mile_after: '',
      incomplete: true, review: false, unreadable: w.unreadable,
      flagged: false, no_fill_marked: false,
      note: noteJoin(w.note, 'บิลไม่ครบ กรุณาตรวจสอบ')
    });
  }
  // 7) บิล PTT → รายการ PTT (ไมล์เอาจากบิลก่อน ถ้าไม่มีใช้ ODO หน้าปัด)
  for (const p of ptts) {
    const dm = dashMap[p.car];
    entries.push({
      car: p.car || '', filled: true, pump: 'PTT',
      date: p.date, coupon: '', invoice: p.invoice, total: p.total,
      mile_after: p.km || (dm && dm.odo ? String(dm.odo) : ''),
      incomplete: false, review: false, unreadable: p.unreadable,
      flagged: p.flagged, no_fill_marked: false, note: p.note
    });
  }

  // 8) คัดรายการเข้า "ต้องตรวจสอบ" (ไม่รวมยอด/CSV — คนตัดสินเอง)
  for (const e of entries) {
    const knownCar = FLEET_VALUES.has(e.car) || String(e.car).startsWith('VIP');
    if (e.unreadable) {
      e.review = true;
      e.note = noteJoin(e.note, 'รูปไม่ชัด อ่านข้อมูลหลักไม่ได้ — เปิดรูปดูแล้วคีย์เอง');
    } else if (!e.car) {
      e.review = true;
      e.note = noteJoin(e.note, 'อ่านทะเบียนรถไม่ได้ — เปิดรูปดูแล้วคีย์เอง');
    } else if (!knownCar) {
      e.review = true;
      e.note = noteJoin(e.note, 'ทะเบียน "' + e.car + '" ไม่อยู่ในทะเบียนรถบริษัท — โปรดตรวจสอบ');
    } else if (noFillSet.has(e.car)) {
      // กฎเหล็ก: เขียน "ไม่เติม" = ไม่เติม บิลที่ชนทะเบียนต้องให้คนเช็คเอง
      e.review = true;
      e.note = noteJoin(e.note, 'หน้าปัดเขียน "ไม่เติม" แต่บิลใบนี้ระบุทะเบียน ' + e.car + ' — โปรดตรวจสอบเองก่อนใช้');
    }
  }

  // 9) รายชื่อ "ไม่เติม": ทุกคันที่เขียนไม่เติม + คันที่มีหน้าปัดแต่ไม่มีบิล
  for (const car of Object.keys(dashMap)) {
    const hasBill = entries.some(e => e.filled && !e.review && e.car === car);
    if (noFillSet.has(car) || !hasBill) {
      entries.push({ car: car, filled: false, review: false, no_fill_marked: noFillSet.has(car),
        pump:'', date:'', invoice:'', coupon:'', total:0, mile_after:'', incomplete:false, unreadable:false, flagged:false, note:'' });
    }
  }
  return entries;
}

// ---------- ตรวจคูปอง/invoice ซ้ำข้ามรายการ (ตาข่ายนิรภัยชั้นสุดท้าย) ----------
function flagDuplicates(list) {
  const seen = {};
  for (const d of list) {
    if (!d.filled || d.review) continue;
    const keys = [];
    if (d.coupon) keys.push('คูปอง ' + d.coupon);
    if (d.invoice) keys.push('invoice ' + d.invoice);
    for (const k of keys) {
      if (seen[k] && seen[k] !== d) {
        d.flagged = true; seen[k].flagged = true;
        d.note = noteJoin(d.note, '⚠️ ' + k + ' ซ้ำกับ ' + seen[k].car + ' — โปรดเช็คบิลจริง');
        seen[k].note = noteJoin(seen[k].note, '⚠️ ' + k + ' ซ้ำกับ ' + d.car + ' — โปรดเช็คบิลจริง');
      } else {
        seen[k] = d;
      }
    }
  }
}

async function compressImage(b64, type) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > MAX_IMG_SIZE || h > MAX_IMG_SIZE) {
        if (w > h) { h = Math.round(h * MAX_IMG_SIZE / w); w = MAX_IMG_SIZE; }
        else { w = Math.round(w * MAX_IMG_SIZE / h); h = MAX_IMG_SIZE; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve({ b64: canvas.toDataURL('image/jpeg', QUALITY).split(',')[1], type: 'image/jpeg' });
    };
    img.src = 'data:' + type + ';base64,' + b64;
  });
}

let files = [], imgData = [], parsed = [];

function onDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').style.background = '#fff';
  onFiles(e.dataTransfer.files);
}

function onFiles(fl) {
  for (let f of fl) {
    if (!f.type.startsWith('image/')) continue;
    if (files.length >= 60) break;
    files.push(f);
    const reader = new FileReader();
    reader.onload = ev => {
      imgData.push({ name: f.name, b64: ev.target.result.split(',')[1], type: f.type });
      const img = document.createElement('img');
      img.src = ev.target.result;
      img.className = 'thumb';
      document.getElementById('preview-row').appendChild(img);
    };
    reader.readAsDataURL(f);
  }
  document.getElementById('cnt-img').textContent = files.length;
  document.getElementById('btn-row').style.display = 'flex';
}

// ========== PROMPT: อ่าน "1 รูป" ต่อ 1 ครั้ง — AI เป็นแค่เครื่องคัดลอก ==========

async function callAPI(img) {
  const comp = await compressImage(img.b64, img.type);
  const content = [
    { type: 'image', source: { type: 'base64', media_type: comp.type, data: comp.b64 } },
    { type: 'text', text: PROMPT }
  ];
  const res = await fetch('/api/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 2000,
      temperature: 0,
      messages: [{ role: 'user', content }]
    })
  });
  const data = await res.json();
  if (!res.ok) throw new Error('Server error ' + res.status + ': ' + (data.error || JSON.stringify(data)));
  if (!data.content) throw new Error('Response ผิดรูปแบบ: ' + JSON.stringify(data).substring(0,200));

  const txt = data.content.map(i => i.text||'').join('').trim();
  const start = txt.indexOf('{');
  const end   = txt.lastIndexOf('}');
  if (start === -1 || end === -1) throw new Error('AI ตอบผิดรูปแบบ: ' + txt.substring(0,150));
  const obj = JSON.parse(txt.substring(start, end+1));
  return { bills: obj.bills || [], dashboards: obj.dashboards || [] };
}

async function analyze() {
  if (!imgData.length) return;
  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('results').innerHTML = '';
  document.getElementById('export-row').style.display = 'none';
  parsed = [];

  const results = new Array(imgData.length);
  const failedImgs = [];
  let nextIdx = 0, doneCnt = 0;

  function tick() {
    doneCnt++;
    document.getElementById('progress-fill').style.width = Math.round((doneCnt/imgData.length)*100)+'%';
    document.getElementById('loading-text').textContent = 'อ่านรูปแล้ว ' + doneCnt + '/' + imgData.length + ' รูป...';
  }

  async function worker() {
    while (true) {
      const i = nextIdx++;
      if (i >= imgData.length) return;
      try {
        results[i] = await callAPI(imgData[i]);
      } catch (e1) {
        try {
          results[i] = await callAPI(imgData[i]);   // ลองซ้ำ 1 ครั้ง
        } catch (e2) {
          results[i] = { bills: [], dashboards: [] };
          failedImgs.push({ n: i+1, name: imgData[i].name, err: e2.message });
        }
      }
      tick();
    }
  }

  try {
    const workers = [];
    for (let k = 0; k < Math.min(CONCURRENCY, imgData.length); k++) workers.push(worker());
    await Promise.all(workers);

    document.getElementById('loading-text').textContent = 'กำลังจับคู่บิลกับรถ...';
    // เรียงตามลำดับรูปเสมอ → ผลลัพธ์เหมือนเดิมทุกรอบ
    const allBills = [], allDash = [];
    results.forEach((r, i) => {
      (r.bills || []).forEach(b => allBills.push(normalizeBill(b, i)));
      (r.dashboards || []).forEach(d => allDash.push(d));
    });
    parsed = assemble(allBills, allDash);
    flagDuplicates(parsed);
    document.getElementById('progress-fill').style.width = '100%';
    renderResults(parsed, failedImgs);
  } catch(e) {
    document.getElementById('results').innerHTML = '<div class="error">เกิดข้อผิดพลาด: '+e.message+'</div>';
  }
  document.getElementById('loading').style.display = 'none';
  btn.disabled = false;
}

// สร้างตารางช่องข้อมูลของการ์ด
function fieldsHtml(d) {
  const pump  = d.pump||'';
  const isPTT = pump.includes('PTT');
  const isKJ  = pump.includes('KJ');
  // บิลไม่ครบ (ใบขาวอย่างเดียว) → โชว์แค่วันที่ ทะเบียน/ยอดอยู่บนหัวการ์ดแล้ว
  if (d.incomplete) {
    return `<div class="fields">
      <div class="field"><div class="field-label">วันที่</div><div class="field-val">${d.date||'-'}</div></div>
    </div>`;
  }
  const couponVal  = d.coupon  || '⚠️ ไม่พบ — คีย์เอง';
  const invoiceVal = d.invoice || '⚠️ ไม่พบ — คีย์เอง';
  const couponStyle  = !d.coupon  ? 'color:#dc2626;font-weight:600' : '';
  const invoiceStyle = !d.invoice ? 'color:#dc2626;font-weight:600' : '';
  return `<div class="fields">
    <div class="field"><div class="field-label">วันที่</div><div class="field-val">${d.date||'-'}</div></div>
    ${isPTT ? `
    <div class="field"><div class="field-label">Invoice</div><div class="field-val" style="font-size:10px;${invoiceStyle}">${invoiceVal}</div></div>
    <div class="field"><div class="field-label">ไมล์หลังเติม</div><div class="field-val">${d.mile_after||'-'}</div></div>` : ''}
    ${isKJ ? `
    <div class="field"><div class="field-label">เลขที่คูปอง</div><div class="field-val" style="${couponStyle}">${couponVal}</div></div>` : ''}
  </div>`;
}

function renderResults(data, failedImgs) {
  const review = data.filter(d => d.review);
  const filled = data.filter(d => d.filled && !d.review);
  const nofill = data.filter(d => !d.filled && !d.review);

  const total = filled.reduce((s,d) => s+(d.total||0), 0);
  document.getElementById('cnt-fill').textContent  = filled.length;
  document.getElementById('cnt-no').textContent    = nofill.length;
  document.getElementById('cnt-total').textContent = '฿'+total.toLocaleString();

  let html = '';

  if (failedImgs && failedImgs.length) {
    html += '<div class="card-warn"><div class="warn-note">⚠️ อ่านไม่สำเร็จ ' + failedImgs.length + ' รูป: ' +
      failedImgs.map(f => 'รูปที่ '+f.n+' ('+f.name+')').join(', ') +
      ' — โปรดเปิดรูปดูแล้วคีย์เอง หรือกดวิเคราะห์ใหม่</div></div>';
  }

  if (review.length) {
    html += '<div class="section-label">⚠️ ต้องตรวจสอบเอง</div>';
    html += '<div class="section-sub">รายการด้านล่างไม่ถูกรวมในยอดรวมและไฟล์ CSV จนกว่าจะตรวจสอบ</div>';
    for (let d of review) {
      const pump = d.pump||'';
      html += `<div class="card-warn">
        <div class="card-header">
          <span class="car-name">${d.car||'ไม่ทราบทะเบียน'}</span>
          ${pump ? `<span class="tag tag-warn">${pump}</span>` : ''}
          ${d.total ? `<span class="amount">฿${d.total.toLocaleString()}</span>` : ''}
        </div>
        ${pump ? fieldsHtml(d) : ''}
        <div class="warn-note">${d.note||'กรุณาตรวจสอบและคีย์ข้อมูลเอง'}</div>
      </div>`;
    }
  }

  if (filled.length) {
    html += '<div class="section-label">รายการเติมน้ำมัน</div>';
    for (let d of filled) {
      const pump  = d.pump||'';
      const isPTT = pump.includes('PTT');
      const tagCls = isPTT ? 'tag-ptt' : 'tag-kj';
      const cardCls = d.flagged ? ' card-alert' : '';
      html += `<div class="card${cardCls}">
        <div class="card-header">
          <span class="car-name">${d.car||'-'}</span>
          <span class="tag ${tagCls}">${pump}</span>
          <span class="amount">฿${(d.total||0).toLocaleString()}</span>
        </div>
        ${fieldsHtml(d)}
        ${d.incomplete ? `<div class="warn-note">บิลไม่ครบ กรุณาตรวจสอบ</div>`
          : (d.note ? `<div class="${d.flagged ? 'note-alert' : 'note'}">${d.note}</div>` : '')}
      </div>`;
    }
  }

  if (nofill.length) {
    html += `<div class="section-label">ไม่เติมน้ำมัน</div>
    <div class="no-fill-box">
      <div style="font-size:13px;color:#888;">รถที่ไม่เติมวันนี้ (${nofill.length} คัน)</div>
      <div class="no-fill-grid">`;
    for (let d of nofill) html += `<div class="no-fill-tag">🚗 ${d.car||'-'}${d.no_fill_marked ? ' ✍️ เขียนไม่เติม' : ''}</div>`;
    html += '</div></div>';
  }

  document.getElementById('results').innerHTML = html;
  if (filled.length) document.getElementById('export-row').style.display = 'flex';
}

function exportCSV(type) {
  const filled = parsed.filter(d => d.filled && !d.review);
  let rows, header;
  if (type === 'ptt') {
    const list = filled.filter(d => (d.pump||'').includes('PTT'));
    header = 'DATE,INVOICE NO.,CAR,TOTAL,MILE';
    // invoice ห่อเป็น ="..." กัน Excel แปลงเลข 18 หลักเป็น 1.26E+17
    rows = list.map(d => `${d.date||''},${d.invoice ? '="'+d.invoice+'"' : ''},${d.car||''},${d.total||''},${d.mile_after||''}`);
  } else {
    const list = filled.filter(d => (d.pump||'').includes('KJ'));
    header = 'DATE,COUPON,CAR,TOTAL,NOTE';
    rows = list.map(d => `${d.date||''},${d.coupon||''},${d.car||''},${d.total||''},${d.incomplete ? 'บิลไม่ครบ กรุณาตรวจสอบ' : ''}`);
  }
  const blob = new Blob(['\uFEFF'+[header,...rows].join('\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = type === 'ptt' ? 'fuel_ptt.csv' : 'fuel_kj.csv';
  a.click();
}

function resetAll() {
  files=[]; imgData=[]; parsed=[];
  document.getElementById('preview-row').innerHTML='';
  document.getElementById('results').innerHTML='';
  document.getElementById('cnt-img').textContent='0';
  document.getElementById('cnt-fill').textContent='0';
  document.getElementById('cnt-no').textContent='0';
  document.getElementById('cnt-total').textContent='฿0';
  document.getElementById('btn-row').style.display='none';
  document.getElementById('export-row').style.display='none';
  document.getElementById('loading').style.display='none';
  document.getElementById('progress-fill').style.width='0%';
}
</script>
