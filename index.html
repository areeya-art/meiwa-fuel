<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เติมน้ำมัน Meiwa</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
.container { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem; }
h1 { font-size: 18px; font-weight: 600; margin-bottom: 1.5rem; }
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.5rem; }
.stat { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 10px; padding: 12px; text-align: center; }
.stat-label { font-size: 11px; color: #888; margin-bottom: 4px; }
.stat-val { font-size: 20px; font-weight: 600; }
.upload-zone { border: 1.5px dashed #ccc; border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; background: #fff; transition: background 0.15s; margin-bottom: 1rem; }
.upload-zone:hover { background: #f9f9f9; }
.upload-icon { font-size: 32px; margin-bottom: 8px; }
.upload-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
.upload-sub { font-size: 13px; color: #888; }
.preview-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }
.thumb { width: 72px; height: 72px; object-fit: cover; border-radius: 8px; border: 0.5px solid #e0e0e0; }
.btn-row { display: none; gap: 8px; margin-bottom: 1rem; }
.btn { padding: 10px 20px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; font-size: 14px; cursor: pointer; font-weight: 500; }
.btn:hover { background: #f5f5f5; }
.btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; flex: 1; }
.btn-primary:hover { background: #333; }
.btn-primary:disabled { background: #999; border-color: #999; cursor: not-allowed; }
.loading { display: none; text-align: center; padding: 2rem; color: #888; font-size: 14px; }
.spinner { width: 24px; height: 24px; border: 2px solid #e0e0e0; border-top-color: #1a1a1a; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.section-label { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin: 1.5rem 0 8px; }
.card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 1rem; margin-bottom: 8px; }
.card-warn { background: #fffbeb; border: 1.5px solid #f59e0b; border-radius: 12px; padding: 1rem; margin-bottom: 8px; }
.card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.car-name { font-size: 16px; font-weight: 600; }
.tag { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500; }
.tag-ptt { background: #e8f0fe; color: #1a56db; }
.tag-bj { background: #e8f5e9; color: #1e7e34; }
.tag-kj { background: #fce7f3; color: #9d174d; }
.tag-cx { background: #fff8e1; color: #b45309; }
.tag-warn { background: #fef3c7; color: #92400e; }
.amount { margin-left: auto; font-size: 15px; font-weight: 600; }
.fields { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 6px; }
.field { background: #f8f8f8; border-radius: 8px; padding: 6px 10px; }
.field-label { font-size: 10px; color: #888; margin-bottom: 2px; }
.field-val { font-size: 12px; font-weight: 500; word-break: break-all; }
.no-fill-box { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 1rem; margin-bottom: 8px; }
.no-fill-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.no-fill-tag { background: #f5f5f5; border-radius: 8px; padding: 6px 12px; font-size: 13px; color: #666; }
.export-row { display: none; gap: 8px; margin-top: 1rem; }
.note { font-size: 12px; color: #888; margin-top: 8px; }
.warn-note { font-size: 12px; color: #92400e; margin-top: 4px; font-weight: 500; }
.error { color: #dc2626; font-size: 13px; padding: 1rem; background: #fef2f2; border-radius: 8px; word-break: break-all; }
@media (max-width: 400px) {
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .stat-val { font-size: 18px; }
}
</style>
</head>
<body>
<div class="container">
  <h1>⛽ ระบบบันทึกน้ำมัน Meiwa</h1>
  <div class="stat-grid">
    <div class="stat"><div class="stat-label">รูปที่อัปโหลด</div><div class="stat-val" id="cnt-img">0</div></div>
    <div class="stat"><div class="stat-label">รายการเติม</div><div class="stat-val" id="cnt-fill">0</div></div>
    <div class="stat"><div class="stat-label">ไม่เติม</div><div class="stat-val" id="cnt-no">0</div></div>
    <div class="stat"><div class="stat-label">ยอดรวม</div><div class="stat-val" id="cnt-total">฿0</div></div>
  </div>
  <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-in').click()" ondragover="event.preventDefault();this.style.background='#f0f0f0'" ondragleave="this.style.background='#fff'" ondrop="onDrop(event)">
    <div class="upload-icon">📷</div>
    <div class="upload-title">อัปโหลดรูปทั้งหมดได้เลย</div>
    <div class="upload-sub">รูปบิล + ไมล์ก่อน + ไมล์หลัง ทุกคัน ไม่ต้องแยก</div>
  </div>
  <input type="file" id="file-in" accept="image/*" multiple style="display:none" onchange="onFiles(this.files)">
  <div class="preview-row" id="preview-row"></div>
  <div class="btn-row" id="btn-row">
    <button class="btn btn-primary" id="analyze-btn" onclick="analyze()">🤖 วิเคราะห์ด้วย AI</button>
    <button class="btn" onclick="resetAll()">ล้าง</button>
  </div>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    AI กำลังอ่านรูปทั้งหมด...
  </div>
  <div id="results"></div>
  <div class="export-row" id="export-row">
    <button class="btn" style="flex:1" onclick="exportCSV('ptt')">⬇️ Export PTT (.csv)</button>
    <button class="btn" style="flex:1" onclick="exportCSV('bj')">⬇️ Export บางจาก/KJ (.csv)</button>
  </div>
</div>
<script>
const FLEET = {
  "7858":"3ฒร 7858","7852":"3ฒร 7852","7862":"3ฒร 7862","7845":"3ฒร 7845",
  "3986":"3ฒศ 3986","4531":"3ฒล 4531","4532":"3ฒล 4532","4534":"3ฒล 4534",
  "7865":"3ฒร 7865","650":"3ฒบ 650","9917":"3ฒบ 9917","4081":"4ฒข 4081",
  "4083":"4ฒข 4083","4080":"4ฒข 4080","6851":"4ฒง 6851","6861":"4ฒง 6861",
  "6862":"4ฒง 6862","651":"3ฒบ 651","3850":"4ฒฌ 3850","4120":"2ฒบ 4120",
  "4533":"3ฒล 4533","4668":"2ฒผ 4668","5593":"4ฒจ 5593","6277":"3ฒส 6277",
  "6926":"4ฒง 6926","7380":"3ฒผ 7380","7847":"3ฒร 7847","7851":"3ฒร 7851",
  "7855":"3ฒร 7855","7924":"2ฒต 7924","9913":"3ฒบ 9913","1606":"2ฒม 1606",
  "7274":"บท 7274","709":"3ฒน 709","711":"3ฒน 711","1570":"3กณ 1570",
  "2120":"3ฒน 2120","3288":"3ฒธ 3288","4423":"ฆผ 4423","4535":"3ฒล 4535",
  "4609":"9กว 4609","4625":"3ฒท 4625","5606":"3ฒญ 5606","5801":"กฉ 5801",
  "6177":"3ฒช 6177","6381":"3ฒพ 6381","6625":"กฉ 6625","6876":"3ฒท 6876",
  "7496":"บท 7496","8708":"6กฮ 8708","2ขศ1207":"2ขศ 1207","2ขฮ1337":"2ขฮ 1337",
  "3ขพ1325":"3ขพ 1325","4กฐ1988":"4กฐ 1988","8กฆ1337":"8กฆ 1337",
  "FORKLIFT":"โฟล์คลิฟท์","SERCOOLER":"เซอร์คูลเลอร์"
};

function matchFleet(raw) {
  if (!raw) return raw;
  const clean = raw.replace(/\s/g,'').toUpperCase();
  for (const [key, val] of Object.entries(FLEET)) {
    if (clean.includes(key.replace(/\s/g,'').toUpperCase())) return val;
  }
  return raw;
}

let files = [], imgData = [], parsed = [];

function onDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').style.background = '#fff';
  onFiles(e.dataTransfer.files);
}

function onFiles(fl) {
  for (let f of fl) {
    if (!f.type.startsWith('image/')) continue;
    files.push(f);
    const reader = new FileReader();
    reader.onload = ev => {
      imgData.push({ name: f.name, b64: ev.target.result.split(',')[1], type: f.type });
      const img = document.createElement('img');
      img.src = ev.target.result;
      img.className = 'thumb';
      document.getElementById('preview-row').appendChild(img);
    };
    reader.readAsDataURL(f);
  }
  document.getElementById('cnt-img').textContent = files.length;
  document.getElementById('btn-row').style.display = 'flex';
}

async function analyze() {
  if (!imgData.length) return;
  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('results').innerHTML = '';
  document.getElementById('export-row').style.display = 'none';

  const content = [];
  for (let img of imgData) {
    content.push({ type: 'image', source: { type: 'base64', media_type: img.type, data: img.b64 } });
  }

  const fleetList = Object.entries(FLEET).map(([k,v]) => k+'='+v).join(', ');

  content.push({ type: 'text', text: `คุณคือระบบบัญชีน้ำมันรถบริษัท Meiwa อ่านรูปทั้งหมดแล้วจัดกลุ่มตามทะเบียนรถ

ทะเบียนรถ (เลขย่อ=ทะเบียนเต็ม): ${fleetList}
เมื่อเห็นเลขย่อในรูปให้แปลงเป็นทะเบียนเต็มเสมอ ทะเบียนรถในป้ายหน้าปัดมักเขียนย่อ เช่น 3288 = 3ฒธ 3288

ตอบเป็น JSON array เท่านั้น ห้ามมีข้อความอื่นนอกจาก JSON:
[{
  "car": "ทะเบียนเต็ม",
  "filled": true หรือ false,
  "pump": "PTT หรือ บางจาก หรือ KJ OIL หรือ Caltex",
  "date": "dd/mm/yy จากบิล",
  "invoice": "เฉพาะ PTT: เลขที่ใบกำกับภาษีท้ายบิล มักขึ้นต้นด้วย 1 และยาว 17-20 หลัก ไม่ใช่เลข TID/TRACE/APPR",
  "coupon": "เฉพาะ บางจาก/KJ OIL: เลขที่คูปอง จากช่อง เลขที่ ในบิลสีเขียว",
  "total": ยอดเงินตัวเลข,
  "mile_after": "เฉพาะ PTT: ไมล์หลังเติม อ่านจากบิลช่อง เลขระยะทาง(KM) หรือ 000xxxxx ถ้าไม่มีในบิลให้อ่านจากรูปหน้าปัดที่มีเลขมากกว่า",
  "image_problem": true ถ้ารูปไม่ชัดอ่านไม่ได้,
  "note": "หมายเหตุ"
}]

กฎสำคัญ:
- PTT: ต้องการ วันที่ + invoice (เลขยาวท้ายบิล ขึ้นต้น 1) + ทะเบียน + ยอด + ไมล์หลังเติม
- บางจาก/KJ OIL (บิลสีเขียว ชื่อ เค เจ ออยล์): ต้องการ วันที่ + คูปอง(เลขที่ในบิล) + ทะเบียน + ยอด เท่านั้น ไม่ต้องมีไมล์และ invoice
- ถ้ารถคันไหนไม่มีบิลหรือมีแค่รูปหน้าปัดรูปเดียว = filled: false
- ถ้ามีรูปหน้าปัด 2 รูปของรถคันเดียวกัน รูปที่มีเลขไมล์มากกว่า = หลังเติม ไม่ต้องนับเป็น 2 รายการ
- ห้ามสร้างรายการซ้ำจากทะเบียนเดียวกัน ให้รวมเป็น 1 รายการ` });

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 3000, messages: [{ role: 'user', content }] })
    });
    const data = await res.json();
    if (!res.ok) throw new Error('Server error ' + res.status + ': ' + (data.error || JSON.stringify(data)));
    if (!data.content) throw new Error('Response ผิดรูปแบบ: ' + JSON.stringify(data).substring(0,200));
    const txt = data.content.map(i => i.text||'').join('').replace(/```json|```/g,'').trim();
    parsed = JSON.parse(txt);
    parsed = parsed.map(d => ({ ...d, car: matchFleet(d.car) }));
    renderResults(parsed);
  } catch(e) {
    document.getElementById('results').innerHTML = '<div class="error">เกิดข้อผิดพลาด: ' + e.message + '</div>';
  }
  document.getElementById('loading').style.display = 'none';
  btn.disabled = false;
}

function renderResults(data) {
  const filled = data.filter(d => d.filled && !d.image_problem);
  const nofill = data.filter(d => !d.filled);
  const warn = data.filter(d => d.image_problem);
  const total = filled.reduce((s,d) => s+(d.total||0), 0);
  document.getElementById('cnt-fill').textContent = filled.length;
  document.getElementById('cnt-no').textContent = nofill.length;
  document.getElementById('cnt-total').textContent = '฿'+total.toLocaleString();

  let html = '';

  if (warn.length) {
    html += '<div class="section-label">⚠️ รูปมีปัญหา — กรุณาคีย์เอง</div>';
    for (let d of warn) {
      html += `<div class="card-warn">
        <div class="card-header">
          <span class="car-name">${d.car||'-'}</span>
          <span class="tag tag-warn">⚠️ รูปไม่ชัด</span>
        </div>
        <div class="warn-note">${d.note||'กรุณาตรวจสอบและคีย์ข้อมูลเอง'}</div>
      </div>`;
    }
  }

  if (filled.length) {
    html += '<div class="section-label">รายการเติมน้ำมัน</div>';
    for (let d of filled) {
      const pump = d.pump||'';
      const tagCls = pump.includes('PTT') ? 'tag-ptt' : pump.includes('KJ') ? 'tag-kj' : pump.includes('บางจาก') ? 'tag-bj' : 'tag-cx';
      const isPTT = pump.includes('PTT') || pump.includes('Caltex');
      const isBJ = pump.includes('บางจาก') || pump.includes('KJ');
      html += `<div class="card">
        <div class="card-header">
          <span class="car-name">${d.car||'-'}</span>
          <span class="tag ${tagCls}">${pump}</span>
          <span class="amount">฿${(d.total||0).toLocaleString()}</span>
        </div>
        <div class="fields">
          <div class="field"><div class="field-label">วันที่</div><div class="field-val">${d.date||'-'}</div></div>
          ${isPTT ? `<div class="field"><div class="field-label">Invoice</div><div class="field-val" style="font-size:10px">${d.invoice||'-'}</div></div>` : ''}
          ${isPTT ? `<div class="field"><div class="field-label">ไมล์หลังเติม</div><div class="field-val">${d.mile_after||'-'}</div></div>` : ''}
          ${isBJ ? `<div class="field"><div class="field-label">คูปอง</div><div class="field-val">${d.coupon||'-'}</div></div>` : ''}
        </div>
        ${d.note ? `<div class="note">${d.note}</div>` : ''}
      </div>`;
    }
  }

  if (nofill.length) {
    html += `<div class="section-label">ไม่เติมน้ำมัน</div>
    <div class="no-fill-box">
      <div style="font-size:13px;color:#888;margin-bottom:4px;">รถที่ไม่เติมวันนี้ (${nofill.length} คัน)</div>
      <div class="no-fill-grid">`;
    for (let d of nofill) html += `<div class="no-fill-tag">🚗 ${d.car||'-'}</div>`;
    html += '</div></div>';
  }

  document.getElementById('results').innerHTML = html;
  if (filled.length) document.getElementById('export-row').style.display = 'flex';
}

function exportCSV(type) {
  const filled = parsed.filter(d => d.filled && !d.image_problem);
  let rows, header;
  if (type === 'ptt') {
    const list = filled.filter(d => (d.pump||'').includes('PTT') || (d.pump||'').includes('Caltex'));
    header = 'DATE,INVOICE NO.,CAR,TOTAL,MILE';
    rows = list.map(d => `${d.date||''},${d.invoice||''},${d.car||''},${d.total||''},${d.mile_after||''}`);
  } else {
    const list = filled.filter(d => (d.pump||'').includes('บางจาก') || (d.pump||'').includes('KJ'));
    header = 'DATE,COUPON,CAR,TOTAL';
    rows = list.map(d => `${d.date||''},${d.coupon||''},${d.car||''},${d.total||''}`);
  }
  const csv = [header, ...rows].join('\n');
  const blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = type === 'ptt' ? 'fuel_ptt.csv' : 'fuel_bangchak_kj.csv';
  a.click();
}

function resetAll() {
  files=[]; imgData=[]; parsed=[];
  document.getElementById('preview-row').innerHTML='';
  document.getElementById('results').innerHTML='';
  document.getElementById('cnt-img').textContent='0';
  document.getElementById('cnt-fill').textContent='0';
  document.getElementById('cnt-no').textContent='0';
  document.getElementById('cnt-total').textContent='฿0';
  document.getElementById('btn-row').style.display='none';
  document.getElementById('export-row').style.display='none';
  document.getElementById('loading').style.display='none';
}
</script>
</body>
</html>
